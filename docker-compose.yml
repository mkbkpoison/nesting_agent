version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=nesting_assistant
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WENXIN_API_KEY=${WENXIN_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - nesting-network

  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nesting_assistant
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nesting-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nesting-network

volumes:
  postgres-data:
  redis-data:

networks:
  nesting-network:
    driver: bridge
