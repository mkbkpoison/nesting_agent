server:
  port: 8088

spring:
  application:
    name: nesting-assistant

  # 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5433/nesting_assistant
    username: postgres
    password: mysecretpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Redis配置
  data:
    redis:
      # ===== Lettuce 配置 =====
      host: localhost
      port: 6379
      password:
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Spring AI配置 - 使用智谱AI
  ai:
    zhipuai:
      api-key: c657d5a77e6e4a849f55db199dd3592d.pnGxEkdwLGHyCPoj
      base-url: https://open.bigmodel.cn/api/paas
      chat:
        options:
          model: glm-4.7-flash
          temperature: 0.8
          max-tokens: 65536
      embedding:
        options:
          model: embedding-3
          dimensions: 1024


    # PGVector向量数据库配置
    vectorstore:
      pgvector:
        dimensions: 1024
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      update-strategy: not_null
    banner: false



# Actuator端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# MCP服务器配置
nesting:
  mcp:
    server:
      base-path: /mcp
      name: nesting-mcp-server
      version: 1.0.0
    client:
      server-url: ""
      api-key: ""

  # 套料助手配置
  assistant:
    system-prompt: |
      你是一个专业的套料软件智能助手，精通板材套料优化算法、设备配置和故障诊断。
      你可以帮助用户解决技术问题、分析系统日志、检索知识库文档并执行诊断操作。

      核心能力：
      1. 技术支持：套料算法参数调优、配置检查、错误代码分析
      2. 系统诊断：日志检查、数据库连接检测、资源监控、许可证检查
      3. 知识检索：从用户手册、FAQ、最佳实践中检索相关信息
      4. 操作执行：执行系统检查命令、生成诊断报告

      回答问题时：
      - 先理解用户意图，选择合适的工具或知识源
      - 提供结构化的解决方案
      - 必要时主动询问更多上下文信息
      - 使用专业但易懂的语言

    max-tool-calls: 15
    conversation-timeout-minutes: 30

    # RAG 检索配置
    rag:
      top-k: 10
      similarity-threshold: 0.7

      # 文档分块配置
      chunk:
        chunk-size: 512              # 每块目标 token 数（中文场景更精确）
        min-chunk-size-chars: 100    # 最小块字符数
        min-chunk-length-to-embed: 50  # 最小 embedding 长度
        max-num-chunks: 100          # 最大块数限制
        keep-separator: true         # 保留分隔符，确保句子完整
        faq-split-threshold: 300     # FAQ/错误码超过此字符数才分块

      # 各检索方法独立配置
      search:
        error-code:
          top-k: 5
          similarity-threshold: 0.5
        faq:
          top-k: 8
          similarity-threshold: 0.75
        best-practice:
          top-k: 5
          similarity-threshold: 0.7
        general:
          top-k: 10
          similarity-threshold: 0.7

# 日志配置
logging:
  level:
    root: WARN
    com.nesting.assistant: WARN
    org.springframework.ai: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger/OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
